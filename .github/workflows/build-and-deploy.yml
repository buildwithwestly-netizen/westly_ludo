      - name: Unzip project
        run: |
          unzip westly_ludo.zip -d temp_extract/
          # Find and move all files to root (handles nested folders)
          find temp_extract -name "pubspec.yaml" -exec dirname {} \; | head -1 | xargs -I {} cp -r {}/* .
          rm -rf temp_extract westly_ludo.zip
          
