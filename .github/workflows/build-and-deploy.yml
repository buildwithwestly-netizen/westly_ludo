name: Build Flutter Web

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Unzip project
        run: |
          unzip westly_ludo.zip -d temp_extract/
          # List what we got
          ls -la temp_extract/
          # Try to move files from nested folder to root
          mv temp_extract/westly_ludo/* . 2>/dev/null || mv temp_extract/*/* . 2>/dev/null || mv temp_extract/* . 2>/dev/null || true
          rm -rf temp_extract westly_ludo.zip
          # Verify pubspec.yaml exists
          ls -la pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
